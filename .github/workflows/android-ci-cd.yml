name: Android CI and CD

on:
  push:
    branches: [ "main", "qa", "develop" ]
  pull_request:
    branches: [ "main", "qa" ]

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      CURRENT_DATE_TIME: ${{ steps.date.outputs.current_date_time }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Debug Keystore
        run: |
          mkdir -p $HOME/.android && mkdir -p $HOME/.config/.android
          keytool -genkeypair -v \
            -keystore $HOME/.config/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Gradle Clean
        run: ./gradlew clean

      - name: Run Lint
        run: ./gradlew lint

      - name: Build with Gradle
        run: ./gradlew assembleDebug -x validateSigningDebug

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./gradlew sonar \
            -Dsonar.projectKey=Android-CICD \
            -Dsonar.projectName='Android-CICD' \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Get Date and Time
        id: date
        run: echo "current_date_time=$(date +"%d-%m-%Y-%H-%M-%S")" >> $GITHUB_OUTPUT

      - name: Copy APK files to directory
        run: |
          mkdir -p apk-files/debug
          mkdir -p apk-files/release
          cp app/build/outputs/apk/debug/app-debug.apk \
            apk-files/debug/app-debug-${{ steps.date.outputs.current_date_time }}.apk 2>/dev/null || true
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
            apk-files/release/app-release-unsigned-${{ steps.date.outputs.current_date_time }}.apk 2>/dev/null || true

      - name: Upload apk-files Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: ${{ github.workspace }}/apk-files
          if-no-files-found: ignore

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download apk-files Artifact
        uses: actions/download-artifact@v4
        with:
          name: apk-files
          path: ${{ github.workspace }}/apk-files
        continue-on-error: true

      - name: Display structure of downloaded files
        run: ls -la ${{ github.workspace }}/apk-files/ || echo "No APK files found"

      - name: Setup JFrog CLI
        continue-on-error: true
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      - name: Create Branch Folder Structure
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/qa" ]]; then
            mkdir -p apk-files/qa/debug apk-files/qa/release
            cp apk-files/debug/* apk-files/qa/debug/ 2>/dev/null || true
            cp apk-files/release/* apk-files/qa/release/ 2>/dev/null || true
          else
            mkdir -p apk-files/master/debug apk-files/master/release
            cp apk-files/debug/* apk-files/master/debug/ 2>/dev/null || true
            cp apk-files/release/* apk-files/master/release/ 2>/dev/null || true
          fi

      - name: Upload APK files to JFrog Artifactory
        continue-on-error: true
        run: |
          jf rt u "apk-files/**" "android-artifact/" --recursive=true
